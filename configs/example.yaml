project:
  name: autodrive-vla
  seed: 42

data:
  dataset_name: toy-driving-vla
  split: train
  observation_shape: [224, 224, 3]
  vehicle_state_dim: 4
  action_dim: 3

model:
  name: toy-driving-vla-model
  hidden_dim: 128

train:
  batch_size: 8
  learning_rate: 0.0001
  max_steps: 100

eval:
  episodes: 5
